apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrails-llm-filter-extproc
  labels:
    app: guardrails-llm-filter-extproc
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: guardrails-llm-filter-extproc
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: guardrails-llm-filter-extproc
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: guardrails-llm-filter-extproc
          image: ghcr.io/cloud-ru-tech/guardrails-llm-filter-extproc:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: guardrails-llm-filter-extproc-env
            - secretRef:
                name: guardrails-llm-filter-extproc-secrets
          ports:
            - containerPort: 9000
              name: grpc
            - containerPort: 9005
              name: health
            - containerPort: 9080
              name: api
            - containerPort: 9090
              name: mgmt-grpc
            - containerPort: 9091
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            grpc:
              port: 9005
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 9005
            initialDelaySeconds: 5
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: guardrails-llm-filter-extproc
                topologyKey: kubernetes.io/hostname
              weight: 1
