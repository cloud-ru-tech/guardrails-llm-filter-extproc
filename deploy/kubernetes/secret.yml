apiVersion: v1
kind: Secret
metadata:
  name: guardrails-llm-filter-extproc-secrets
type: Opaque
stringData:
  # The configuration API (:9080) is unauthenticated and needs no secret —
  # protect it at the network layer (cluster-internal only, never public
  # ingress).
  # Credentials for external store backends (set what your backend needs).
  GUARDRAILS_STORE_REDIS_PASSWORD: ""
  # GUARDRAILS_STORE_POSTGRES_DSN: postgres://user:pass@host:5432/guardrails?sslmode=disable
  # At-rest encryption key for masking state (base64 32-byte key,
  # generate with `openssl rand -base64 32`); pair with
  # GUARDRAILS_STORE_ENCRYPTION_ENABLED=true in the ConfigMap.
  # GUARDRAILS_STORE_ENCRYPTION_KEY: ""
