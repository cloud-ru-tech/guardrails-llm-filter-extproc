syntax = "proto3";

package cloudru.guardrails.v1.service.contracts;

import "proto/protovalidate/buf/validate/validate.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/cloud-ru-tech/guardrails-llm-filter-extproc/pkg/api/proto/cloudru/guardrails/v1/service/contracts;contractsv1";

// SetRuleEnabledRequest enables or disables one rule. This is the only
// mutation permitted on built-in rules.
message SetRuleEnabledRequest {
  string rule_id = 1 [
    (buf.validate.field).string.min_len = 1,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Rule identifier";
    }
  ];
  // enabled is required: absence is rejected rather than defaulting to false.
  optional bool enabled = 2 [
    (buf.validate.field).required = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Desired enabled state";
    }
  ];
}
