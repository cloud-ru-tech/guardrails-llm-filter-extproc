syntax = "proto3";

package cloudru.guardrails.v1.service.contracts;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/cloud-ru-tech/guardrails-llm-filter-extproc/pkg/api/proto/cloudru/guardrails/v1/service/contracts;contractsv1";

// GetDataTypesRequest lists the toggleable data-type groups.
message GetDataTypesRequest {}

// DataTypeInfo describes one toggleable data-type group.
message DataTypeInfo {
  int32 data_type = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Numeric data-type ID";
    }
  ];
  string name = 2;
  string display_name = 3;
  string description = 4;
}

// GetDataTypesResponse is the catalog of data-type groups plus CUSTOM.
message GetDataTypesResponse {
  repeated DataTypeInfo data_types = 1;
}
