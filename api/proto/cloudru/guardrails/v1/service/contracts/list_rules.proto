syntax = "proto3";

package cloudru.guardrails.v1.service.contracts;

import "proto/protovalidate/buf/validate/validate.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "api/proto/cloudru/guardrails/v1/service/common/guardrail_rule.proto";

option go_package = "github.com/cloud-ru-tech/guardrails-llm-filter-extproc/pkg/api/proto/cloudru/guardrails/v1/service/contracts;contractsv1";

// ListRulesRequest lists rules filtered by source.
message ListRulesRequest {
  // Source selects which rules to return: "all" (default), "builtin" or "custom".
  string source = 1 [
    (buf.validate.field).string = {in: ["", "all", "builtin", "custom"]},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Rule source filter: all|builtin|custom (default all)";
    }
  ];
}

// ListRulesResponse is the list of rules.
message ListRulesResponse {
  repeated common.GuardrailRule rules = 1;
}
