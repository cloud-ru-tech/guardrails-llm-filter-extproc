syntax = "proto3";

package cloudru.guardrails.v1.service.common;

import "proto/protovalidate/buf/validate/validate.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "api/proto/cloudru/guardrails/v1/service/common/data_type.proto";

option go_package = "github.com/cloud-ru-tech/guardrails-llm-filter-extproc/pkg/api/proto/cloudru/guardrails/v1/service/common;commonv1";

// Masking describes how a detected value is replaced during masking.
message Masking {
  // CaptureGroups selects which regex capture groups to mask; empty masks the
  // full match.
  repeated int32 capture_groups = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Regex capture groups to mask; empty masks the full match";
    }
  ];
  // Placeholder is the placeholder base name; the engine renders <NAME_N>.
  string placeholder = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Placeholder base name; rendered as <NAME_N>";
      example: "\"EMAIL\"";
    }
  ];
}

// GuardrailRule is a single detection rule (built-in or custom). It mirrors the
// engine rule (pkg/guardrails/regex/rule.Rule). It is used as both the request
// body (create/update) and the response for rule read/write RPCs; source and
// enabled are response-only and ignored on input.
message GuardrailRule {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "Guardrail Rule";
      description: "A detection rule: RE2 regex plus optional validators and masking policy";
    };
  };

  string rule_id = 1 [
    (buf.validate.field).string = {min_len: 1, max_len: 255},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Unique rule identifier";
      example: "\"my-custom-email\"";
    }
  ];
  string name = 2 [
    (buf.validate.field).string = {min_len: 1, max_len: 255},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Human-readable rule name";
    }
  ];
  string group = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Rule group (informational)";
    }
  ];
  DataType data_type = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Data category this rule detects";
    }
  ];
  string regex = 5 [
    (buf.validate.field).string.min_len = 1,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "RE2 detection pattern";
    }
  ];
  repeated string keywords = 6 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Optional keyword pre-filter terms";
    }
  ];
  repeated string validators = 7 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Optional candidate validators (e.g. luhn, entropy, ip_v4)";
    }
  ];
  int32 min_length = 8 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Minimum matched length before a hit counts";
    }
  ];
  double entropy = 9 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Minimum Shannon entropy for the entropy validator";
    }
  ];
  repeated string banlist = 10 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Values excluded from matching";
    }
  ];
  Masking masking = 11 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Masking policy for this rule";
    }
  ];

  // Response-only fields.
  string source = 12 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Response-only: \"builtin\" or \"custom\"";
    }
  ];
  optional bool enabled = 13 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Response-only: whether the rule is currently enabled";
    }
  ];
}
