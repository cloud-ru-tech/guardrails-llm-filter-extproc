syntax = "proto3";

package cloudru.guardrails.v1.service.common;

import "protoc-gen-openapiv2/options/annotations.proto";
import "api/proto/cloudru/guardrails/v1/service/common/data_type.proto";

option go_package = "github.com/cloud-ru-tech/guardrails-llm-filter-extproc/pkg/api/proto/cloudru/guardrails/v1/service/common;commonv1";

// GuardrailsSettings is the global (instance-wide) guardrails configuration.
// It is used as both the update request body and the read/update response.
message GuardrailsSettings {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "Guardrails Settings";
      description: "Global masking policy applied to all traffic";
    };
  };

  bool enabled = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Whether masking is enabled globally";
    }
  ];
  repeated DataType data_types = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Enabled data categories";
    }
  ];
  // mode is "enforce" (default) or "detect"; empty resolves to enforce.
  string mode = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Enforcement mode: \"enforce\" (default) or \"detect\"";
      example: "\"enforce\"";
    }
  ];
}
