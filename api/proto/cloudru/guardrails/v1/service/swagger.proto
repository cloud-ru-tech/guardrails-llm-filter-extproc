syntax = "proto3";

package cloudru.guardrails.v1.service;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/cloud-ru-tech/guardrails-llm-filter-extproc/pkg/api/proto/cloudru/guardrails/v1/service;servicev1";

// Document-level OpenAPI options. The management API is unauthenticated by
// design and must be protected at the network layer, so no security scheme is
// declared here.
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Guardrails Management API";
    description: "Management API for the standalone guardrails service: custom rule CRUD, global settings, data-type discovery and dry-run masking checks. The data-plane LLM proxy is a separate HTTP surface and is not part of this contract.";
    version: "1.0.0";
  };
  schemes: [HTTP, HTTPS];
  consumes: ["application/json"];
  produces: ["application/json"];

  responses: {
    key: "400";
    value: {
      description: "Bad Request - invalid parameters or malformed request";
      schema: {json_schema: {ref: ".google.rpc.Status"}};
    };
  };
  responses: {
    key: "404";
    value: {
      description: "Not Found";
      schema: {json_schema: {ref: ".google.rpc.Status"}};
    };
  };
  responses: {
    key: "409";
    value: {
      description: "Conflict";
      schema: {json_schema: {ref: ".google.rpc.Status"}};
    };
  };
  responses: {
    key: "500";
    value: {
      description: "Internal Server Error";
      schema: {json_schema: {ref: ".google.rpc.Status"}};
    };
  };

  tags: [
    {
      name: "Guardrails";
      description: "Rule, settings and data-type management, plus dry-run scan";
    }
  ];
};
