guardrails_regex_rules:
  - data_type: 1
    group_priority: 80
    name: CREDENTIALS
    display_name: Учетные данные
    description: Пароли, client credentials, OAuth/session артефакты
    rules:
      - rule_id: credentials.adobe-client-id.gl
        name: credentials.adobe-client-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:adobe)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-f0-9]{32})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [adobe]
        entropy: 2.0
        masking:
          capture_groups: [1]
          placeholder: ADOBE_CLIENT_ID
      - rule_id: credentials.adobe-client-secret.gl
        name: credentials.adobe-client-secret.gl
        regex: "\\b(p8e-(?i)[a-z0-9]{32})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [p8e-]
        entropy: 2.0
        masking:
          capture_groups: [1]
          placeholder: ADOBE_CLIENT_SECRET
      - rule_id: credentials.asana-client-id.gl
        name: credentials.asana-client-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:asana)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([0-9]{16})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [asana]
        masking:
          capture_groups: [1]
          placeholder: ASANA_CLIENT_ID
      - rule_id: credentials.asana-client-secret.gl
        name: credentials.asana-client-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:asana)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{32})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [asana]
        masking:
          capture_groups: [1]
          placeholder: ASANA_CLIENT_SECRET
      - rule_id: credentials.azure-ad-client-secret.gl
        name: credentials.azure-ad-client-secret.gl
        regex: "(?:^|[\\\\'\"\\x60\\s>=:(,)])([a-zA-Z0-9_~.]{3}\\dQ~[a-zA-Z0-9_~.-]{31,34})(?:$|[\\\\'\"\\x60\\s<),])"
        keywords: [q~]
        entropy: 3.0
        masking:
          capture_groups: [1]
          placeholder: AZURE_AD_CLIENT_SECRET
      - rule_id: credentials.bitbucket-client-id.gl
        name: credentials.bitbucket-client-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:bitbucket)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{32})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [bitbucket]
        masking:
          capture_groups: [1]
          placeholder: BITBUCKET_CLIENT_ID
      - rule_id: credentials.bitbucket-client-secret.gl
        name: credentials.bitbucket-client-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:bitbucket)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9=_\\-]{64})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [bitbucket]
        masking:
          capture_groups: [1]
          placeholder: BITBUCKET_CLIENT_SECRET
      - rule_id: credentials.curl-auth-header.gl
        name: credentials.curl-auth-header.gl
        regex: "\\bcurl\\b(?:.*?|.*?(?:[\\r\\n]{1,2}.*?){1,5})[ \\t\\n\\r](?:-H|--header)(?:=|[ \\t]{0,5})(?:\"(?i)(?:Authorization:[ \\t]{0,5}(?:Basic[ \\t]([a-z0-9+/]{8,}={0,3})|(?:Bearer|(?:Api-)?Token)[ \\t]([\\w=~@.+/-]{8,})|([\\w=~@.+/-]{8,}))|(?:(?:X-(?:[a-z]+-)?)?(?:Api-?)?(?:Key|Token)):[ \\t]{0,5}([\\w=~@.+/-]{8,}))\"|'(?i)(?:Authorization:[ \\t]{0,5}(?:Basic[ \\t]([a-z0-9+/]{8,}={0,3})|(?:Bearer|(?:Api-)?Token)[ \\t]([\\w=~@.+/-]{8,})|([\\w=~@.+/-]{8,}))|(?:(?:X-(?:[a-z]+-)?)?(?:Api-?)?(?:Key|Token)):[ \\t]{0,5}([\\w=~@.+/-]{8,}))')(?:\\B|\\s|\\z)"
        keywords: [curl]
        entropy: 2.75
        masking:
          capture_groups: [1, 2, 3, 4, 5, 6, 7, 8]
          placeholder: CURL_AUTH_HEADER
      - rule_id: credentials.curl-auth-user.gl
        name: credentials.curl-auth-user.gl
        regex: "\\bcurl\\b(?:.*|.*(?:[\\r\\n]{1,2}.*){1,5})[ \\t\\n\\r](?:-u|--user)(?:=|[ \\t]{0,5})(\"(:[^\"]{3,}|[^:\"]{3,}:|[^:\"]{3,}:[^\"]{3,})\"|'([^:']{3,}:[^']{3,})'|((?:\"[^\"]{3,}\"|'[^']{3,}'|[\\w$@.-]+):(?:\"[^\"]{3,}\"|'[^']{3,}'|[\\w${}@.-]+)))(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|\\z)"
        keywords: [curl]
        entropy: 2.0
        masking:
          capture_groups: [2, 3, 4]
          placeholder: CURL_AUTH_USER
      - rule_id: credentials.digitalocean-refresh-token.gl
        name: credentials.digitalocean-refresh-token.gl
        regex: "(?i)\\b(dor_v1_[a-f0-9]{64})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [dor_v1_]
        masking:
          capture_groups: [1]
          placeholder: DIGITALOCEAN_REFRESH_TOKEN
      - rule_id: credentials.discord-client-id.gl
        name: credentials.discord-client-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:discord)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([0-9]{18})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [discord]
        entropy: 2.0
        masking:
          capture_groups: [1]
          placeholder: DISCORD_CLIENT_ID
      - rule_id: credentials.discord-client-secret.gl
        name: credentials.discord-client-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:discord)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9=_\\-]{32})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [discord]
        entropy: 2.0
        masking:
          capture_groups: [1]
          placeholder: DISCORD_CLIENT_SECRET
      - rule_id: credentials.facebook-secret.gl
        name: credentials.facebook-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:facebook)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-f0-9]{32})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [facebook]
        entropy: 3.0
        masking:
          capture_groups: [1]
          placeholder: FACEBOOK_SECRET
      - rule_id: credentials.finicity-client-secret.gl
        name: credentials.finicity-client-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:finicity)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{20})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [finicity]
        masking:
          capture_groups: [1]
          placeholder: FINICITY_CLIENT_SECRET
      - rule_id: credentials.github-oauth.gl
        name: credentials.github-oauth.gl
        regex: gho_[0-9a-zA-Z]{36}
        keywords: [gho_]
        entropy: 3.0
        masking:
          placeholder: GITHUB_OAUTH
      - rule_id: credentials.github-refresh-token.gl
        name: credentials.github-refresh-token.gl
        regex: ghr_[0-9a-zA-Z]{36}
        keywords: [ghr_]
        entropy: 3.0
        masking:
          placeholder: GITHUB_REFRESH_TOKEN
      - rule_id: credentials.gitlab-oauth-app-secret.gl
        name: credentials.gitlab-oauth-app-secret.gl
        regex: "gloas-[0-9a-zA-Z_\\-]{64}"
        keywords: [gloas-]
        entropy: 3.0
        masking:
          placeholder: GITLAB_OAUTH_APP_SECRET
      - rule_id: credentials.gitlab-session-cookie.gl
        name: credentials.gitlab-session-cookie.gl
        regex: _gitlab_session=([0-9a-z]{32})
        keywords: [_gitlab_session=]
        entropy: 3.0
        masking:
          capture_groups: [1]
          placeholder: GITLAB_SESSION_COOKIE
      - rule_id: credentials.hashicorp-tf-password.gl
        name: credentials.hashicorp-tf-password.gl
        regex: "(?i)[\\w.-]{0,50}?(?:administrator_login_password|password)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}\\\\?\"([a-z0-9=_\\-]{8,20})\\\\?\"(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [administrator_login_password, password]
        entropy: 2.0
        masking:
          capture_groups: [1]
          placeholder: HASHICORP_TF_PASSWORD
      - rule_id: credentials.intra42-client-secret.gl
        name: credentials.intra42-client-secret.gl
        regex: "\\b(s-s4t2(?:ud|af)-(?i)[abcdef0123456789]{64})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [intra, s-s4t2ud-, s-s4t2af-]
        entropy: 3.0
        masking:
          capture_groups: [1]
          placeholder: INTRA42_CLIENT_SECRET
      - rule_id: credentials.jwt-base64.gl
        name: credentials.jwt-base64.gl
        regex: "\\bZXlK(?:(?P<alg>aGJHY2lPaU)|(?P<apu>aGNIVWlPaU)|(?P<apv>aGNIWWlPaU)|(?P<aud>aGRXUWlPaU)|(?P<b64>aU5qUWlP)|(?P<crit>amNtbDBJanBi)|(?P<cty>amRIa2lPaU)|(?P<epk>bGNHc2lPbn)|(?P<enc>bGJtTWlPaU)|(?P<jku>cWEzVWlPaU)|(?P<jwk>cWQyc2lPb)|(?P<iss>cGMzTWlPaU)|(?P<iv>cGRpSTZJ)|(?P<kid>cmFXUWlP)|(?P<key_ops>clpYbGZiM0J6SWpwY)|(?P<kty>cmRIa2lPaUp)|(?P<nonce>dWIyNWpaU0k2)|(?P<p2c>d01tTWlP)|(?P<p2s>d01uTWlPaU)|(?P<ppt>d2NIUWlPaU)|(?P<sub>emRXSWlPaU)|(?P<svt>emRuUWlP)|(?P<tag>MFlXY2lPaU)|(?P<typ>MGVYQWlPaUp)|(?P<url>MWNtd2l)|(?P<use>MWMyVWlPaUp)|(?P<ver>MlpYSWlPaU)|(?P<version>MlpYSnphVzl1SWpv)|(?P<x>NElqb2)|(?P<x5c>NE5XTWlP)|(?P<x5t>NE5YUWlPaU)|(?P<x5ts256>NE5YUWpVekkxTmlJNkl)|(?P<x5u>NE5YVWlPaU)|(?P<zip>NmFYQWlPaU))[a-zA-Z0-9\\/\\\\_+\\-\\r\\n]{40,}={0,2}"
        keywords: [zxlk]
        entropy: 2.0
        masking:
          placeholder: JWT_BASE64
      - rule_id: credentials.jwt.gl
        name: credentials.jwt.gl
        regex: "\\b(ey[a-zA-Z0-9]{17,}\\.ey[a-zA-Z0-9\\/_-]{17,}\\.(?:[a-zA-Z0-9\\/_-]{10,}={0,2})?)(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [ey]
        entropy: 3.0
        masking:
          capture_groups: [1]
          placeholder: JWT
      - rule_id: credentials.kubernetes-secret-yaml.gl
        name: credentials.kubernetes-secret-yaml.gl
        regex: "(?i)(?:\\bkind:[ \\t]*[\"']?\\bsecret\\b[\"']?(?s:.){0,200}?\\bdata:(?s:.){0,100}?\\s+[\\w.-]+:(?:[ \\t]*(?:\\||>[-+]?)\\s+)?[ \\t]*[\"']?([a-z0-9+/]{10,}={0,3})[\"']?|\\bdata:(?s:.){0,100}?\\s+[\\w.-]+:(?:[ \\t]*(?:\\||>[-+]?)\\s+)?[ \\t]*[\"']?([a-z0-9+/]{10,}={0,3})[\"']?(?s:.){0,200}?\\bkind:[ \\t]*[\"']?\\bsecret\\b[\"']?)"
        keywords: [secret]
        masking:
          capture_groups: [1, 2]
          placeholder: KUBERNETES_SECRET_YAML
      - rule_id: credentials.linear-client-secret.gl
        name: credentials.linear-client-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:linear)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-f0-9]{32})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [linear]
        entropy: 2.0
        masking:
          capture_groups: [1]
          placeholder: LINEAR_CLIENT_SECRET
      - rule_id: credentials.linkedin-client-id.gl
        name: credentials.linkedin-client-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:linked[_-]?in)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{14})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [linkedin, linked_in, linked-in]
        entropy: 2.0
        masking:
          capture_groups: [1]
          placeholder: LINKEDIN_CLIENT_ID
      - rule_id: credentials.linkedin-client-secret.gl
        name: credentials.linkedin-client-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:linked[_-]?in)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{16})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [linkedin, linked_in, linked-in]
        entropy: 2.0
        masking:
          capture_groups: [1]
          placeholder: LINKEDIN_CLIENT_SECRET
      - rule_id: credentials.looker-client-id.gl
        name: credentials.looker-client-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:looker)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{20})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [looker]
        masking:
          capture_groups: [1]
          placeholder: LOOKER_CLIENT_ID
      - rule_id: credentials.looker-client-secret.gl
        name: credentials.looker-client-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:looker)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{24})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [looker]
        masking:
          capture_groups: [1]
          placeholder: LOOKER_CLIENT_SECRET
      - rule_id: credentials.messagebird-client-id.gl
        name: credentials.messagebird-client-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:message[_-]?bird)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [messagebird, message-bird, message_bird]
        masking:
          capture_groups: [1]
          placeholder: MESSAGEBIRD_CLIENT_ID
      - rule_id: credentials.new-relic-user-api-id.gl
        name: credentials.new-relic-user-api-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:new-relic|newrelic|new_relic)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{64})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [new-relic, newrelic, new_relic]
        masking:
          capture_groups: [1]
          placeholder: NEW_RELIC_USER_API_ID
      - rule_id: credentials.nuget-config-password.gl
        name: credentials.nuget-config-password.gl
        regex: "(?i)<add key=\\\"(?:(?:ClearText)?Password)\\\"\\s*value=\\\"(.{8,})\\\"\\s*/>"
        keywords: [<add key=]
        entropy: 1.0
        masking:
          capture_groups: [1]
          placeholder: NUGET_CONFIG_PASSWORD
      - rule_id: credentials.plaid-client-id.gl
        name: credentials.plaid-client-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:plaid)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{24})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [plaid]
        entropy: 3.5
        masking:
          capture_groups: [1]
          placeholder: PLAID_CLIENT_ID
      - rule_id: credentials.planetscale-oauth-token.gl
        name: credentials.planetscale-oauth-token.gl
        regex: "\\b(pscale_oauth_[\\w=\\.-]{32,64})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [pscale_oauth_]
        entropy: 3.0
        masking:
          capture_groups: [1]
          placeholder: PLANETSCALE_OAUTH_TOKEN
      - rule_id: credentials.planetscale-password.gl
        name: credentials.planetscale-password.gl
        regex: "(?i)\\b(pscale_pw_(?i)[\\w=\\.-]{32,64})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [pscale_pw_]
        entropy: 3.0
        masking:
          capture_groups: [1]
          placeholder: PLANETSCALE_PASSWORD
      - rule_id: credentials.sendbird-access-id.gl
        name: credentials.sendbird-access-id.gl
        regex: "(?i)[\\w.-]{0,50}?(?:sendbird)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [sendbird]
        masking:
          capture_groups: [1]
          placeholder: SENDBIRD_ACCESS_ID
      - rule_id: credentials.shopify-shared-secret.gl
        name: credentials.shopify-shared-secret.gl
        regex: shpss_[a-fA-F0-9]{32}
        keywords: [shpss_]
        entropy: 2.0
        masking:
          placeholder: SHOPIFY_SHARED_SECRET
      - rule_id: credentials.sidekiq-secret.gl
        name: credentials.sidekiq-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:BUNDLE_ENTERPRISE__CONTRIBSYS__COM|BUNDLE_GEMS__CONTRIBSYS__COM)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-f0-9]{8}:[a-f0-9]{8})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [bundle_enterprise__contribsys__com, bundle_gems__contribsys__com]
        masking:
          capture_groups: [1]
          placeholder: SIDEKIQ_SECRET
      - rule_id: credentials.sidekiq-sensitive-url.gl
        name: credentials.sidekiq-sensitive-url.gl
        regex: "(?i)\\b(https?://[a-f0-9]{8}:[a-f0-9]{8}@(?:gems.contribsys.com|enterprise.contribsys.com))(?:[\\/#?:\\x60'\"\\s,;.!()\\[\\]{}]|$)"
        keywords: [gems.contribsys.com, enterprise.contribsys.com]
        masking:
          capture_groups: [1]
          placeholder: SIDEKIQ_SENSITIVE_URL
      - rule_id: credentials.slack-config-refresh-token.gl
        name: credentials.slack-config-refresh-token.gl
        regex: "(?i)xoxe-\\d-[A-Z0-9]{146}"
        keywords: [xoxe-]
        entropy: 2.0
        masking:
          placeholder: SLACK_CONFIG_REFRESH_TOKEN
      - rule_id: credentials.sumologic-access-id.gl
        name: credentials.sumologic-access-id.gl
        regex: "[\\w.-]{0,50}?(?i:[\\w.-]{0,50}?(?:(?-i:[Ss]umo|SUMO))(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3})(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}(su[a-zA-Z0-9]{12})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [sumo]
        entropy: 3.0
        masking:
          capture_groups: [1]
          placeholder: SUMOLOGIC_ACCESS_ID
      - rule_id: credentials.twitter-access-secret.gl
        name: credentials.twitter-access-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:twitter)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{45})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [twitter]
        masking:
          capture_groups: [1]
          placeholder: TWITTER_ACCESS_SECRET
      - rule_id: credentials.twitter-api-secret.gl
        name: credentials.twitter-api-secret.gl
        regex: "(?i)[\\w.-]{0,50}?(?:twitter)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{50})(?:[\\x60'\"\\s,;:!?()\\[\\]{}]|\\\\[nr]|$)"
        keywords: [twitter]
