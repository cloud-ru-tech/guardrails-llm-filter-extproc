# guardrails_regex_rules.yaml — v1 ruleset for guardrails-llm-filter-extproc
#
# DataType fields:
#   data_type       — numeric type identifier (must match the models.DataType enum)
#   group_priority  — overlap priority for this data type (higher wins; reserved for future resolver)
#   name            — unique group name
#   display_name    — human-readable name shown in UI
#   description     — short description of what the group covers
#
# Rule fields:
#   rule_id     — stable string rule identifier
#   name        — unique rule name
#   regex       — detection pattern (Go RE2 syntax)
#   min_length  — minimum match length to avoid trivial FP
#   keywords    — pre-filter: at least one must be present in text (case-insensitive)
#   entropy     — minimum Shannon entropy of the matched value
#   banlist     — block list for exact candidate value (lower-cased)
#   validators  — extra validation steps:
#                 [luhn, snils, inn_person, inn_org, ogrn, ogrnip, iban_mod97, email_ascii, payment_card, ip_v4, ip_v6, ip_public, ip_private]
#   masking:
#     capture_groups — semantic capture group indexes (1-based); absent means full match
#     placeholder    — placeholder type name (e.g. PEM_KEY -> <PEM_KEY_1>)

guardrails_regex_rules:
  - data_type: 1
    group_priority: 90
    name: CREDENTIALS
    display_name: "Учетные данные"
    description: "URL/DSN с кредами, HTTP-авторизация, заголовки API-ключей и password assignment"
    rules:
      - rule_id: credentials.url_with_creds
        name: credentials.url_with_creds
        regex: '(?i)((?:https?|ftp)://[^:\s@/\\]+:[^@\s/''"`,\\]{3,}@[^\s''"`\\,;!?()\[\]{}]*[^\s''"`\\,;.!?()\[\]{}])(?:[\x60''"\s,;.!?()\[\]{}]|\\[nr]|$)'
        masking:
          capture_groups: [1]
          placeholder: "URL_WITH_CREDS"

      - rule_id: credentials.db_connection
        name: credentials.db_connection 
        regex: '(?i)((?:postgres(?:ql)?|mysql|mssql|mongodb(?:\+srv)?)://[^:@\s\\]+:[^@\s''"`\,\\]{3,}@[^\s''"`\,;!?()\[\]{}\\]*[^\s''"`\,;.!?()\[\]{}\\])(?:[\x60''"\s,;.!?()\[\]{}]|\\[nr]|$)'
        masking:
          capture_groups: [1]
          placeholder: "DB_DSN"

      - rule_id: credentials.redis_connection
        name: credentials.redis_connection
        regex: '(?i)(redis(?:s)?://(?:[^:@/\s\\]*:)[^@\s/''"`?,#\\]{3,}@[^\s''"`\\,;!?()\[\]{}]*[^\s''"`\\,;.!?()\[\]{}])(?:[\x60''"\s,;.!?()\[\]{}]|\\[nr]|$)'
        masking:
          capture_groups: [1]
          placeholder: "REDIS_DSN"

      - rule_id: credentials.amqp_connection
        name: credentials.amqp_connection
        regex: '(?i)((?:amqps?)://(?:[^:@/\s\\]*:)[^@\s/''"`?,#\\]{3,}@[^\s''"`\\,;!?()\[\]{}]*[^\s''"`\\,;.!?()\[\]{}])(?:[\x60''"\s,;.!?()\[\]{}]|\\[nr]|$)'
        masking:
          capture_groups: [1]
          placeholder: "AMQP_DSN"

      - rule_id: credentials.nats_connection
        name: credentials.nats_connection
        regex: '(?i)(nats://(?:[^:@/\s\\]+:)[^@\s/''"`?,\\]{3,}@[^\s''"`\\,;!?()\[\]{}]*[^\s''"`\\,;.!?()\[\]{}])(?:[\x60''"\s,;.!?()\[\]{}]|\\[nr]|$)'
        masking:
          capture_groups: [1]
          placeholder: "NATS_DSN"

      - rule_id: credentials.http_auth_basic
        name: credentials.http_auth_basic
        regex: '(?i)Authorization:\s*Basic\s+([A-Za-z0-9+/]{8,}={0,2})(?:[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        keywords: ["Authorization", "Basic"]
        masking:
          capture_groups: [1]
          placeholder: "HTTP_AUTH_BASIC"

      - rule_id: credentials.http_auth_bearer
        name: credentials.http_auth_bearer
        regex: '(?i)Authorization:\s*(?:Bearer|Token)\s+([A-Za-z0-9\-_.~+/]{12,512})(?:[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        keywords: ["Authorization", "Bearer", "Token"]
        masking:
          capture_groups: [1]
          placeholder: "BEARER_TOKEN"

      - rule_id: credentials.url_encoded_bearer_token
        name: credentials.url_encoded_bearer_token
        regex: '(?i)(?:^|[?&\s])(?:auth|authorization|access_token|token)=["'']?(?:Bearer|Token)(?:%20|\+|\s)+([A-Za-z0-9\-_.~+/]{12,512})(?:[&\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        keywords: ["Bearer", "Token", "%20"]
        masking:
          capture_groups: [1]
          placeholder: "BEARER_TOKEN"

      - rule_id: credentials.api_key_header
        name: credentials.api_key_header
        regex: '(?i)(?:X-(?:Api-)?Key|Api-Key|X-Auth-Token)\s*:\s*([A-Za-z0-9\-_.~+/]{12,512})(?:[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        keywords: ["api", "key", "token"]
        masking:
          capture_groups: [1]
          placeholder: "API_KEY_HEADER"

      - rule_id: credentials.nested_json_api_key
        name: credentials.nested_json_api_key
        regex: '(?i)(?:^|[,{]\s*)"?(?:api[-_]?key|key)"?\s*:\s*"?([A-Za-z0-9\-_.~+/]{12,512})(?:[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        keywords: ["api", "key"]
        masking:
          capture_groups: [1]
          placeholder: "API_KEY_HEADER"

      - rule_id: credentials.password
        name: credentials.password
        regex: '(?i)(?:password|passwd|pwd)\s*[:=>{]+\s*(?:"([^"\\\r\n]{6,256})"|''([^''\\\r\n]{6,256})''|"([^\\\s''"`\,;:)\]\}]{6,256})|''([^\\\s''"`\,;:)\]\}]{6,256})|([^\\\s''"`\,;:)\]\}]{6,256}))(?:[\x60''"\s,;:()\[\]{}]|\\[nr]|$)'
        keywords: ["password", "passwd", "pwd"]
        entropy: 2.5
        banlist:
          - password
          - qwerty
          - "123456"
          - "12345678"
          - "111111"
          - letmein
          - admin
          - welcome
          - secret
          - changeme
          - pass
        masking:
          capture_groups: [1, 2, 3, 4, 5]
          placeholder: "PASSWORD"

      - rule_id: credentials.oauth_query_secret
        name: credentials.oauth_query_secret
        regex: '(?i)(?:\?|&)(?:access_token|refresh_token|id_token|client_secret)=([A-Za-z0-9._~+/%=-]{8,512})(?:[&\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        keywords: ["access_token", "refresh_token", "id_token", "client_secret"]
        masking:
          capture_groups: [1]
          placeholder: "OAUTH_QUERY_SECRET"

      - rule_id: credentials.oauth_body_secret
        name: credentials.oauth_body_secret
        regex: '(?i)(?:^|[&\s{,]|\\")["'']?(?:access_token|refresh_token|id_token|client_secret)["'']?(?:\\"|["''])?\s*[:=]\s*(?:\\"|["''])?([A-Za-z0-9._~+/%=-]{8,512})(?:\\"|[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        keywords: ["access_token", "refresh_token", "id_token", "client_secret"]
        masking:
          capture_groups: [1]
          placeholder: "OAUTH_BODY_SECRET"

  - data_type: 2
    group_priority: 100
    name: API_KEYS
    display_name: "API-ключи"
    description: "API-ключи"
    rules:

      - rule_id: api_keys.stripe-key
        name: api_keys.stripe-key
        regex: '(sk_live_[A-Za-z0-9]{24,64})(?:[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        masking:
          capture_groups: [1]
          placeholder: "STRIPE_API_KEY"

      - rule_id: api_keys.stripe-restricted
        name: api_keys.stripe-restricted
        regex: '(rk_live_[A-Za-z0-9]{24,64})(?:[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        masking:
          capture_groups: [1]
          placeholder: "STRIPE_RESTRICTED_API_KEY"

  - data_type: 3
    group_priority: 85
    name: ACCESS_TOKENS
    display_name: "Токены доступа"
    description: "Токены сервисов и инфраструктуры"
    rules:
      - rule_id: access_tokens.twilio-auth-token
        name: access_tokens.twilio-auth-token
        regex: '\b([a-f0-9]{32})\b'
        keywords: ["twilio", "auth_token"]
        entropy: 3.5
        masking:
          capture_groups: [1]
          placeholder: "TWILIO_AUTH_TOKEN"

      - rule_id: access_tokens.npm-token
        name: access_tokens.npm-token
        regex: '(npm_[A-Za-z0-9]{36})(?:[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        masking:
          capture_groups: [1]
          placeholder: "NPM_TOKEN"

      - rule_id: access_tokens.vault-token
        name: access_tokens.vault-token
        regex: '(hv[sbr]\.[A-Za-z0-9_\-]{90,120})(?:[\x60''"\s,;:!?()\[\]{}]|\\[nr]|$)'
        keywords: ["vault", "VAULT_TOKEN"]
        masking:
          capture_groups: [1]
          placeholder: "VAULT_TOKEN"
      
      - rule_id: access_tokens.private-key-pem
        name: access_tokens.private-key-pem
        regex: '-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----[\s\S]+?-----END (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'
        masking:
          placeholder: "PEM_KEY"

  - data_type: 4
    group_priority: 40
    name: IP_ADDRESSES
    display_name: "IP-адреса"
    description: "IP-адреса"
    rules:
      - rule_id: ip-addrs.ipv4
        name: ip-addrs.ipv4
        regex: '\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)\b'
        validators: [ip_v4]
        masking:
          placeholder: "IPV4"

      - rule_id: ip-addrs.ipv4-cidr
        name: ip-addrs.ipv4-cidr
        regex: '\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)/(?:3[0-2]|[12]?\d)\b'
        validators: [ip_v4]
        masking:
          placeholder: "IPV4_CIDR"

      - rule_id: ip-addrs.ipv4-public
        name: ip-addrs.ipv4-public
        regex: '\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)\b'
        validators: [ip_v4, ip_public]
        masking:
          placeholder: "IPV4"

      - rule_id: ip-addrs.ipv4-private
        name: ip-addrs.ipv4-private
        regex: '\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)\b'
        validators: [ip_v4, ip_private]
        masking:
          placeholder: "IPV4"

      - rule_id: ip-addrs.ipv6
        name: ip-addrs.ipv6
        regex: '(?i)(?:^|[^0-9a-f:])([0-9a-f]{0,4}(?::[0-9a-f]{0,4}){2,7})(?:$|[^0-9a-f:])'
        validators: [ip_v6]
        masking:
          capture_groups: [1]
          placeholder: "IPV6"

      - rule_id: ip-addrs.ipv6-cidr
        name: ip-addrs.ipv6-cidr
        regex: '(?i)(?:^|[^0-9a-f:/])([0-9a-f]{0,4}(?::[0-9a-f]{0,4}){2,7}/(?:12[0-8]|1[01]\d|[1-9]?\d))(?:$|[^0-9a-f:/])'
        validators: [ip_v6]
        masking:
          capture_groups: [1]
          placeholder: "IPV6_CIDR"

      - rule_id: ip-addrs.ipv6-public
        name: ip-addrs.ipv6-public
        regex: '(?i)(?:^|[^0-9a-f:])([0-9a-f]{0,4}(?::[0-9a-f]{0,4}){2,7})(?:$|[^0-9a-f:])'
        validators: [ip_v6, ip_public]
        masking:
          capture_groups: [1]
          placeholder: "IPV6"

      - rule_id: ip-addrs.ipv6-private
        name: ip-addrs.ipv6-private
        regex: '(?i)(?:^|[^0-9a-f:])([0-9a-f]{0,4}(?::[0-9a-f]{0,4}){2,7})(?:$|[^0-9a-f:])'
        validators: [ip_v6, ip_private]
        masking:
          capture_groups: [1]
          placeholder: "IPV6"

  - data_type: 5
    group_priority: 50
    name: PERSONAL_DATA
    display_name: "Персональные данные"
    description: "Телефонные номера (РФ), email, СНИЛС, ИНН, ОГРН, ОГРНИП, банковские карты (Visa, MasterCard, Мир), IBAN"
    rules:
      - rule_id: pii.phone-ru
        name: pii.phone-ru
        # Leading guard (start-of-line or a non-digit) prevents matching a phone
        # that is actually a substring of a longer digit run (e.g. a card number);
        # the trailing \b prevents swallowing/adjoining extra digits. Only capture
        # group 1 (the number itself) is masked, so the guard char is left intact.
        regex: '(?:^|[^\d])((?:\+7|8)[\s\-]?\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2})\b'
        min_length: 10
        masking:
          capture_groups: [1]
          placeholder: "PHONE_RU"

      - rule_id: pii.email
        name: pii.email
        # Leading guard excludes backslash so that JSON escape sequences like
        # \n@allure.epic (where \n is a two-char escape) are not falsely matched.
        # Only capture group 1 (the email) is masked; the guard char stays intact.
        regex: '(?:^|[^\w\\])([A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,63})\b'
        min_length: 6
        validators: [email_ascii]
        masking:
          capture_groups: [1]
          placeholder: "EMAIL"

      - rule_id: pii.docs.snils
        name: pii.docs.snils
        # Separators (space/dash) optional and independent between groups, so all of
        # "123-456-789 12", "901 144 044 41", "901144044 41", "90114404441" match.
        # The snils validator strips non-digits and verifies the checksum, which
        # rejects any 11-digit false positive.
        regex: '\b\d{3}[\s-]?\d{3}[\s-]?\d{3}[\s-]?\d{2}\b'
        validators: [snils]
        masking:
          placeholder: "SNILS"

      - rule_id: pii.docs.passport
        name: pii.docs.passport
        # RF internal passport (4-digit series + 6-digit number) has no checksum,
        # so context keywords (паспорт/серия/...) are required *inside* the regex.
        # The `keywords` field below stays informational: the "пасп\.?" branch
        # matches without any full keyword, so the keyword pre-filter treats this
        # rule as NOT eligible and always scans it (the in-regex context is what
        # guarantees precision). Only the digit span is masked via capture group 1.
        # Handles
        # "4509 123456", "45 09 123456",
        # "4509123456", "серия 4509 номер 123456", "45 09 № 123456".
        regex: '(?i)(?:паспорт(?:\s+рф)?|пасп\.?|серия)[\s№:.-]*(\d{2}[\s-]?\d{2}[\s-]*(?:(?:№|номер)[\s№:.-]*)?\d{6})\b'
        keywords: ["паспорт", "серия", "номер"]
        masking:
          capture_groups: [1]
          placeholder: "PASSPORT_RF"

      - rule_id: pii.docs.inn-person
        name: pii.docs.inn-person
        regex: '\b\d{12}\b'
        min_length: 12
        keywords: ["ИНН", "инн", "inn", "ИНН:"]
        validators: [inn_person]
        masking:
          placeholder: "INN_PERSON"

      - rule_id: pii.docs.inn-org
        name: pii.docs.inn-org
        regex: '\b\d{10}\b'
        min_length: 10
        keywords: ["ИНН", "инн", "inn", "ИНН:"]
        validators: [inn_org]
        masking:
          placeholder: "INN_ORG"

      - rule_id: pii.docs.ogrn
        name: pii.docs.ogrn
        regex: '\b\d{13}\b'
        min_length: 13
        keywords: ["ОГРН", "ogrn"]
        validators: [ogrn]
        masking:
          placeholder: "OGRN"

      - rule_id: pii.docs.ogrnip
        name: pii.docs.ogrnip
        regex: '\b3\d{14}\b'
        min_length: 15
        keywords: ["ОГРНИП", "ogrnip"]
        validators: [ogrnip]
        masking:
          placeholder: "OGRNIP"

      - rule_id: pii.fin.credit-card
        name: pii.fin.credit-card
        regex: '\b(?:4|5[1-5]|2(?:2(?:2[1-9]|[3-9]\d)|[3-6]\d{2}|7(?:0\d|20))|3[47]|6011|64[4-9]|65|62|220[0-4])(?:[ -]?\d){11,17}\b'
        min_length: 13
        validators: [luhn, payment_card]
        masking:
          placeholder: "CREDIT_CARD"

      - rule_id: pii.fin.iban
        name: pii.fin.iban
        regex: '\b[A-Z]{2}\d{2}(?: ?[A-Z0-9]){11,30}\b'
        min_length: 15
        validators: [iban_mod97]
        masking:
          placeholder: "IBAN"
