static_resources:
  listeners:
    - name: main
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                # SECURITY: the guardrails service keys per-request masking
                # state on x-request-id. A client-controlled or predictable
                # value could be used to read another request's stored
                # originals or clobber its state, so the edge proxy MUST
                # generate the id and MUST NOT trust the client's copy.
                generate_request_id: true
                preserve_external_request_id: false
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: llm
                      domains: ["*"]
                      # SECURITY: the guardrails override header is trusted
                      # gateway input — always strip the client-supplied copy.
                      request_headers_to_remove:
                        - x-guardrails-data-types
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: mock_llm
                            timeout: 120s
                http_filters:
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: extproc_guardrails
                        timeout: 30s
                      # Fail-open: if the guardrails service is down, traffic
                      # passes through unmasked. Set to false to fail-closed.
                      failure_mode_allow: true
                      message_timeout: 10s
                      # REQUIRED processing modes for this service:
                      # the request body is masked as a whole (BUFFERED);
                      # the response body is demasked as a stream
                      # (FULL_DUPLEX_STREAMED), which requires
                      # response_trailer_mode: SEND.
                      processing_mode:
                        request_header_mode: SEND
                        response_header_mode: SEND
                        request_body_mode: BUFFERED
                        response_body_mode: FULL_DUPLEX_STREAMED
                        response_trailer_mode: SEND
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: extproc_guardrails
      type: STRICT_DNS
      connect_timeout: 5s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: extproc_guardrails
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: guardrails-llm-filter-extproc, port_value: 9000 }

    - name: mock_llm
      type: STRICT_DNS
      connect_timeout: 5s
      load_assignment:
        cluster_name: mock_llm
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: mock-llm, port_value: 8000 }

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }
