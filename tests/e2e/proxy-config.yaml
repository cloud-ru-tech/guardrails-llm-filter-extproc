static_resources:
  listeners:
    - name: main
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                generate_request_id: true
                preserve_external_request_id: false
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: llm
                      domains: ["*"]
                      # NOTE: production MUST strip the client copy of the
                      # override header. This test harness IS the trusted
                      # gateway, so it forwards x-guardrails-data-types to
                      # exercise the narrowing path.
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: upstream_llm
                            timeout: 300s
                http_filters:
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: extproc_guardrails
                        timeout: 30s
                      failure_mode_allow: true
                      message_timeout: 10s
                      processing_mode:
                        request_header_mode: SEND
                        response_header_mode: SEND
                        request_body_mode: BUFFERED
                        response_body_mode: FULL_DUPLEX_STREAMED
                        response_trailer_mode: SEND
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: extproc_guardrails
      type: STRICT_DNS
      connect_timeout: 5s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: extproc_guardrails
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: host.docker.internal, port_value: 9000 }

    - name: upstream_llm
      type: STRICT_DNS
      connect_timeout: 5s
      load_assignment:
        cluster_name: upstream_llm
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: host.docker.internal, port_value: 8890 }

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }
